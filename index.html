<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singapore Sustainable Fish Expert Chatbot</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .message-appear { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const KNOWLEDGE_BASE = `
        PASARFISH GUIDE SUMMARY:
        - Provides identification for 60+ Singapore market fishes.
        - Includes English, Malay (M), Hokkien/Teochew (C), and Local English (E) names.
        - Pricing levels: $ (<$20/kg), $$ ($20-30/kg), $$$ (>$30/kg).
        - Cooking categories: Steaming, Soups/Stews, Frying, Fish Paste, Grilling, Baking, Curries.

        KEY FISH DATA EXAMPLES:
        - Malabar Snapper (Ikan Merah / Ang Gui): $$
        - Red Emperor Snapper (Ang Sai): $$
        - Goldbanded Jobfish (Ang Ko Li): $
        - Areolate Grouper (Huay Gau): $
        - Hybrid Grouper (Dragon Tiger): $$
        - Leopard Coral Grouper (Ang Gau - 7 star): $$$
        - Fourfinger Threadfin (Ngor Soon): $$
        - Indian Threadfin (Kurau / Ngor Her): $$$
        - Narrow-barred Spanish Mackerel (Batang): $$
        - Chinese Silver Pomfret (Dao Cheoh): $$$
        - Black Pomfret (Orh Cheoh): $
        - Asian Sea Bass (Barramundi / Kim Bak Lor): $
        - Salmon: $$$
        - Marble Goby (Soon Hock): $$$

        WWF SEAFOOD GUIDE 2016 (Sustainability):
        - RECOMMENDED (Green): Yellow-tailed Scad (Selar), Milkfish (Bandeng), Yellowtail Fusilier, John's Snapper (Ang Zho), Barramundi (Farmed), Golden Pomfret (Farmed), Red Tilapia.
        - THINK TWICE (Yellow): Albacore Tuna (Wild), Mud Crab, Red Tilapia (Farmed), Chilean Seabass, Rock Lobster, Indian Mackerel (Kembong), Spanish Mackerel (Batang), Flower Crab.
        - AVOID (Red): Silver Pomfret (Wild), Orange Spotted Grouper, Black Pomfret, All Rays, All Sharks, All Bluefin Tuna.
        `;

        const App = () => {
            const [messages, setMessages] = useState([
                {
                    role: 'assistant',
                    content: "Hello! I'm your Singapore Sustainable Fish Expert.How can I help you today?"
                }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [showDisclaimer, setShowDisclaimer] = useState(true);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const callGemini = async (userQuery) => {
                const apiKey = ""; // Runtime provides the key automatically
                const systemPrompt = `
                    You are the "Singapore Sustainable Fish Expert" chatbot. 
                    Your knowledge is based on the Pasarfish Identification Guide and the WWF Singapore Seafood Guide.
                    
                    RULES:
                    1. Context: ${KNOWLEDGE_BASE}
                    2. Use local names (Hokkien/Malay) to sound authentic to the Singapore wet market context.
                    3. Mention sustainability if the fish is in the WWF "Avoid" or "Recommended" list.
                    4. Keep responses helpful for shoppers or home cooks.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Might you want to ask another question?";
                } catch (error) {
                    return "Sorry, I'm having trouble connecting. Please check your internet.";
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsLoading(true);

                const response = await callGemini(userMsg);
                setMessages(prev => [...prev, { role: 'assistant', content: response }]);
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen max-w-2xl mx-auto border-x bg-white relative">
                    {/* Header */}
                    <header className="bg-blue-800 text-white p-4 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-white/20 p-2 rounded-lg">
                                <i data-lucide="fish"></i>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg">SG Fish Expert</h1>
                                <p className="text-[10px] text-blue-200">Pasarfish & WWF Knowledge Base</p>
                            </div>
                        </div>
                    </header>

                    {/* Messages */}
                    <main className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} message-appear`}>
                                <div className={`max-w-[85%] p-3 rounded-2xl ${
                                    m.role === 'user' 
                                        ? 'bg-blue-600 text-white rounded-tr-none' 
                                        : 'bg-slate-100 text-slate-800 rounded-tl-none'
                                }`}>
                                    <p className="text-sm whitespace-pre-wrap">{m.content}</p>
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="bg-slate-100 p-3 rounded-2xl rounded-tl-none flex gap-1">
                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></div>
                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    {/* Input */}
                    <footer className="p-4 border-t bg-slate-50">
                        <form onSubmit={handleSend} className="flex gap-2">
                            <input 
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Ask about Batang..."
                                className="flex-1 bg-white border rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
                            />
                            <button 
                                type="submit"
                                disabled={!input.trim() || isLoading}
                                className="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 disabled:opacity-50"
                            >
                                <i data-lucide="send-horizontal"></i>
                            </button>
                        </form>
                    </footer>

                    {/* Disclaimer Modal */}
                    {showDisclaimer && (
                        <div className="absolute inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-6 text-center">
                            <div className="bg-white rounded-3xl p-8 shadow-2xl max-w-sm">
                                <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide="shield-check" className="text-blue-600 w-8 h-8"></i>
                                </div>
                                <h2 className="text-xl font-bold mb-2">Fish Guide</h2>
                                <p className="text-slate-500 text-sm mb-6">
                                    This chatbot uses data from the <strong>Pasarfish Guide</strong> and <strong>WWF Seafood Guide</strong>.
                                </p>
                                <button 
                                    onClick={() => {
                                        setShowDisclaimer(false);
                                        setTimeout(() => lucide.createIcons(), 10);
                                    }}
                                    className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold"
                                >
                                    Understood
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Initialize App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Icons
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
